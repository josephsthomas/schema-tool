name: Deploy
# Build brief plan §8.2 — deploy to GH Pages on push to main.
# Source must be set to "GitHub Actions" in Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Refresh schema dataset
        run: pnpm ingest:refresh
      - name: Validate authored content
        run: pnpm content:validate
      - name: Verification gate (every Type-level example must be verified)
        run: pnpm verification:check
      - name: Run tests
        run: pnpm test
      - name: Build
        env:
          VITE_BASE_PATH: /schema-tool/
        run: pnpm build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
