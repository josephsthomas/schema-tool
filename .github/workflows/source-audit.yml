name: Source liveness audit
# Plan §4.3 — weekly re-fetch of every URL cited in src/data/content/**/*.sources.json.
# 4xx/5xx → set verification=flagged on the sidecar and open a GitHub issue.

on:
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run source-liveness audit
        id: audit
        run: pnpm content:audit-sources --output audit-report.json
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-audit-report
          path: audit-report.json
      - name: Open issues for broken sources
        if: ${{ steps.audit.outputs.broken_count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS=$'\t' read -r term url status; do
            title="Broken source: ${term} (${status})"
            body="The cited source ${url} for term ${term} returned HTTP ${status} during the weekly audit on $(date -u +%Y-%m-%d).\n\nThe sidecar has been auto-flagged. Re-author the example with a current allowlisted source and re-verify."
            gh issue create --title "$title" --body "$body" --label "source-audit"
          done < audit-broken.tsv || true
      - name: Commit flagged sidecars
        if: ${{ steps.audit.outputs.broken_count != '0' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/content
          git commit -m "Source audit: auto-flag $(cat audit-broken.tsv | wc -l) broken sources"
          git push
